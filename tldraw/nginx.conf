# Per-service nginx config for the TLDraw SPA bundle. Sits behind the hub's
# reverse-proxy nginx, which terminates TLS and adds HSTS/CSP at the edge.
# This server's job is just to serve the built /dist with SPA fallback and a
# minimal defense-in-depth header set.

server {
    listen 3000;
    listen [::]:3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Defense-in-depth headers. The hub's edge nginx may set richer headers;
    # these are safe additions that won't conflict.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # gzip — compresses the ~1.8 MB tldraw bundle to ~570 KB on the wire.
    gzip on;
    gzip_types text/css application/javascript application/json text/plain image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Hashed asset bundles can be cached aggressively — Vite emits content
    # hashes in filenames (index-CnnWkN6D.js) so cache-busting is automatic.
    location ~* ^/assets/.+\.(js|css|woff2?|ttf|otf|png|jpg|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — anything that isn't a file on disk is rewritten to
    # index.html so client-side routing (/tldraw/room-name) works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't serve hidden files (dotfiles).
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
