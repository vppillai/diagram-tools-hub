name: Security Scan

on:
  schedule:
    # Run security scans weekly
    - cron: '0 2 * * 1'
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # whiteboard/ is a submodule; without recursive checkout Trivy
          # would scan an empty directory and silently miss its dep tree.
          submodules: recursive

      # Pinned to a release tag (was @master). A compromised upstream commit
      # would otherwise be silently pulled into every CI run that has
      # security-events: write + pull-requests: write permissions.
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'Trivy Security Scan'

      # `continue-on-error: true` was here, which made the
      # `--severity-threshold=high` flag meaningless — high/critical CVEs
      # got logged as warnings and the job still passed. Removed.
      - name: Run Snyk security scan
        run: |
          cd ./tldraw
          npx snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # Tag-pinned (was @main). Same supply-chain reasoning as trivy-action.
      - name: Check for secrets in code
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@v3.82.0
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}

      - name: Check for secrets in code (PR)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@v3.82.0
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}

      - name: Run Bandit security linter
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-report.json || true



      - name: Comment security findings
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🔒 Security Scan Results\n\n';
            
            // Add Trivy results if available
            if (fs.existsSync('trivy-results.sarif')) {
              comment += '### 🔍 Vulnerability Scan\n';
              comment += 'Trivy scan completed. Check the Security tab for details.\n\n';
            }
            
            // Add Bandit results if available
            if (fs.existsSync('bandit-report.json')) {
              const banditReport = JSON.parse(fs.readFileSync('bandit-report.json', 'utf8'));
              if (banditReport.results && banditReport.results.length > 0) {
                comment += '### ⚠️ Security Issues Found\n';
                banditReport.results.forEach(result => {
                  comment += `- **${result.issue_severity}**: ${result.issue_text} (${result.filename}:${result.line_number})\n`;
                });
              } else {
                comment += '### ✅ No security issues found by Bandit\n';
              }
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: comment
            }); 