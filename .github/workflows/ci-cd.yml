name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # Simple build test
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [tldraw, whiteboard]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # whiteboard/ is a git submodule pinned to a release tag of
          # vppillai/whiteboard. Without this, docker build in the
          # whiteboard matrix entry would fail with an empty directory.
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build service
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          cd "./$SERVICE"
          if [ "$SERVICE" = "whiteboard" ]; then
            docker build --build-arg BASE_PATH=/whiteboard/ -t "$SERVICE:test" .
          else
            docker build -t "$SERVICE:test" .
          fi
          echo "✅ $SERVICE image built successfully"

  # Build and push Docker images
  build-and-push:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [tldraw]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max