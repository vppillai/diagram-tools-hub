# Tag a version, write release notes (with real changelog), build + push
# per-service Docker images (tldraw, whiteboard) to GHCR.
#
# Manually triggered via Actions UI. Specify version in x.y.z form
# (e.g., 1.3.1). The 'v' prefix is auto-applied.
#
# What this gives you that the old workflow didn't:
#   - Non-empty changelog (git log <prev-tag>..HEAD; old code did
#     compareCommits('main','HEAD') which is always empty when dispatched
#     from main HEAD)
#   - Both tldraw AND whiteboard images published (old code did tldraw only)
#   - Per-service image namespaces matching ci-cd.yml's build-and-push
#     (ghcr.io/...-tldraw and ghcr.io/...-whiteboard, not the legacy
#     bundled namespace)
#   - All actions on Node-24 versions (no deprecation warnings)

name: "🚀 Release Management"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.0.0 or v1.0.0 — normalized to vx.y.z)"
        required: true
        type: string
      release_type:
        description: "Release type (informational only)"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Is this a prerelease?"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.normalize.outputs.version }}
    steps:
      - name: Checkout (full history + submodules)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Normalize version format
        id: normalize
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          # Strip any leading 'v', validate x.y.z, re-add 'v'.
          CLEAN=$(echo "$INPUT_VERSION" | sed 's/^v//')
          if ! echo "$CLEAN" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be x.y.z (received: $INPUT_VERSION)"
            exit 1
          fi
          VERSION="v$CLEAN"
          echo "Normalized: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Find previous tag
        id: previous_tag
        env:
          NEW_VERSION: ${{ steps.normalize.outputs.version }}
        run: |
          # Most recent semver tag, excluding the new one being created.
          # Filter to vN.N.N (no pre-release suffix, no the-double-v typo).
          PREV=$(git tag --sort=-v:refname \
                 | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                 | grep -v "^${NEW_VERSION}$" \
                 | head -1 || true)
          echo "Previous tag: ${PREV:-<none — first release>}"
          echo "tag=${PREV}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        env:
          PREV_TAG: ${{ steps.previous_tag.outputs.tag }}
        run: |
          if [ -n "$PREV_TAG" ]; then
            echo "Building changelog: $PREV_TAG..HEAD"
            LOG=$(git log "$PREV_TAG..HEAD" --pretty=format:'- %s (%h)' --no-merges)
            if [ -z "$LOG" ]; then
              LOG="- (no new commits since $PREV_TAG)"
            fi
          else
            LOG="- Initial release."
          fi
          # Multi-line output via heredoc.
          {
            echo "result<<CHANGELOG_EOF"
            echo "$LOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "--- Generated changelog ---"
          echo "$LOG"

      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.normalize.outputs.version }}
          name: Release ${{ steps.normalize.outputs.version }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
          body: |
            ## 🚀 Release ${{ steps.normalize.outputs.version }}

            Type: **${{ github.event.inputs.release_type }}** ([compare](https://github.com/${{ github.repository }}/compare/${{ steps.previous_tag.outputs.tag }}...${{ steps.normalize.outputs.version }}))

            ### What's Changed

            ${{ steps.changelog.outputs.result }}

            ### 🐳 Docker images

            Per-service images, version-tagged + `:latest`:

            - **TLDraw**: `ghcr.io/${{ env.IMAGE_NAME }}-tldraw:${{ steps.normalize.outputs.version }}`
            - **Whiteboard**: `ghcr.io/${{ env.IMAGE_NAME }}-whiteboard:${{ steps.normalize.outputs.version }}`

            ```bash
            docker pull ghcr.io/${{ env.IMAGE_NAME }}-tldraw:${{ steps.normalize.outputs.version }}
            docker pull ghcr.io/${{ env.IMAGE_NAME }}-whiteboard:${{ steps.normalize.outputs.version }}
            ```

            ### 🚀 Quick start

            ```bash
            git clone --recurse-submodules https://github.com/${{ github.repository }}.git
            cd diagram-tools-hub
            git checkout ${{ steps.normalize.outputs.version }}
            ./manage-config.sh start
            # Hub at https://localhost:8080
            ```

            ### 📋 Bundled tools

            - 🎨 **Draw.io** — Professional diagramming platform
            - ✏️ **Excalidraw** — Hand-drawn style diagrams
            - 🎨 **TLDraw** — Modern collaborative drawing canvas (v5)
            - 🖊️ **Whiteboard** — Low-latency pen-optimized whiteboard for Wacom Intuos
            - 🔧 **Easy Management** — `manage-config.sh` orchestrates everything

            ### 🛠️ System requirements

            - Docker + Docker Compose plugin
            - 4 GB RAM minimum
            - 2 GB disk space

  build-and-push:
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # `include` lets each service carry its own build_args. tldraw needs
        # none; whiteboard needs BASE_PATH baked in at build time so asset
        # URLs resolve correctly under nginx's sub-path mount.
        include:
          - service: tldraw
            build_args: ""
          - service: whiteboard
            build_args: |
              BASE_PATH=/whiteboard/
    steps:
      - name: Checkout at the new tag (with submodules)
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.create-release.outputs.version }}
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
          tags: |
            type=raw,value=${{ needs.create-release.outputs.version }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.service }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
