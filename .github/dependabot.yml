version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/tldraw"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "vppillai"
    assignees:
      - "vppillai"
    commit-message:
      prefix: "npm"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/tldraw-sync-backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "vppillai"
    assignees:
      - "vppillai"
    commit-message:
      prefix: "npm"
      include: "scope"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "vppillai"
    assignees:
      - "vppillai"
    commit-message:
      prefix: "ci"
      include: "scope"

  # Docker base-image updates for the per-service Dockerfiles.
  # (A duplicate "Docker Compose" entry pointing at the same directory
  # was here previously — dependabot dedupes silently, so the second
  # block was dead config that confused readers.)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "vppillai"
    assignees:
      - "vppillai"
    commit-message:
      prefix: "docker"
      include: "scope"
